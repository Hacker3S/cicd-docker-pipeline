name: CI/CD Pipeline

# Trigger: run on every push and PR targeting main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-docker-pipeline

jobs:

  # ---------- JOB 1: RUN TESTS ----------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: pytest -v

  # ---------- JOB 2: BUILD & PUSH DOCKER IMAGE ----------
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Only push images from main, not from PR branches
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ---------- JOB 3: DEPLOY (pull the freshly pushed image and smoke-test it) ----------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest image from Docker Hub
        run: docker pull ${{ env.IMAGE_NAME }}:latest

      - name: Run container
        run: docker run -d -p 5000:5000 --name cicd-app ${{ env.IMAGE_NAME }}:latest

      - name: Wait for app to boot
        run: sleep 5

      - name: Smoke test the /health endpoint
        run: curl -f http://localhost:5000/health

      - name: Stop and remove container
        if: always()
        run: docker rm -f cicd-app
